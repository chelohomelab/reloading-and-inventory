<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First-Run Setup — Guns & Reloading</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center p-4" style="background-image: url('/static/images/background-2.png'); background-size: contain; background-repeat: no-repeat; background-attachment: fixed; background-position: center; background-color: #0f0f0f;">

    <div class="w-full max-w-sm">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">🔧</div>
            <h1 class="text-2xl font-bold tracking-wide text-amber-500">First-Run Setup</h1>
            <p class="text-gray-500 text-sm mt-1">Create your admin account to get started</p>
        </div>

        <!-- Card -->
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-2xl space-y-5">

            <div class="bg-blue-900/40 border border-blue-700/60 text-blue-300 text-xs rounded-lg px-4 py-3">
                This page is only accessible once. After your account is created it will be locked.
            </div>

            {% if error %}
            <div class="flex items-center gap-2 bg-red-900/50 border border-red-700 text-red-300 text-sm rounded-lg px-4 py-3">
                <span>⚠️</span><span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/setup" class="space-y-4" onsubmit="return validateSetup()">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Username</label>
                    <input
                        type="text"
                        name="username"
                        id="setup-username"
                        autocomplete="username"
                        autofocus
                        required
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition"
                        placeholder="choose a username"
                    >
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="setup-password"
                        autocomplete="new-password"
                        required
                        minlength="8"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition"
                        placeholder="at least 8 characters"
                    >
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Confirm Password</label>
                    <input
                        type="password"
                        id="setup-confirm"
                        autocomplete="new-password"
                        required
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition"
                        placeholder="repeat password"
                    >
                    <p id="pw-mismatch" class="text-red-400 text-xs mt-1 hidden">Passwords do not match</p>
                </div>

                <button
                    type="submit"
                    class="w-full bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2.5 rounded-lg text-sm transition cursor-pointer"
                >
                    Create Account & Continue
                </button>
            </form>
        </div>
    </div>

    <script>
        function validateSetup() {
            const pw = document.getElementById('setup-password').value;
            const confirm = document.getElementById('setup-confirm').value;
            const msg = document.getElementById('pw-mismatch');
            if (pw !== confirm) {
                msg.classList.remove('hidden');
                return false;
            }
            msg.classList.add('hidden');
            return true;
        }
    </script>

</body>
</html>
